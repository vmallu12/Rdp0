<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Railway Desktop</title>

<meta http-equiv="refresh" content="0;url=/vnc.html?autoconnect=1&resize=scale&quality=9&compression=9&view_only=0">

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#0f172a;
    color:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
}

.loader{
    text-align:center;
}

.spinner{
    width:50px;
    height:50px;
    border:5px solid rgba(255,255,255,.2);
    border-top:5px solid #3b82f6;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:auto;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

h2{
    margin-top:20px;
    font-weight:500;
}

p{
    opacity:.8;
}
</style>

</head>

<body>

<div class="loader">
<div class="spinner"></div>

<h2>Starting Railway Desktop...</h2>

<p>Please wait...</p>

</div>

</body>
</html>
